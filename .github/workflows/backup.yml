name: Backup Supabase Data

on:
  schedule:
    - cron: '0 8 * * *'   # 8am UTC daily — adjust to your preferred time
  workflow_dispatch:        # lets you trigger it manually from the Actions tab too

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch data from Supabase
        run: |
          mkdir -p backups
          curl -s "https://tkstnkdxefivxeubfyeu.supabase.co/rest/v1/app_state?select=*" \
            -H "apikey: sb_publishable_Dm3G5t5tmiydMThQx60TDg_J1L_zzbG" \
            -H "Authorization: Bearer sb_publishable_Dm3G5t5tmiydMThQx60TDg_J1L_zzbG" \
            -o "backups/$(date +'%Y-%m-%d').json"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/
          git diff --staged --quiet || git commit -m "Daily Supabase backup $(date +'%Y-%m-%d')"
          git push
