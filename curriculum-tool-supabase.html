<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Curriculum Studio — Pitch Day Deliverables</title>
<style>
  :root{
    --navy:#1c2b4a; --navy-deep:#12203b; --gold:#c9a227; --gold-light:#e8d9a8;
    --paper:#faf9f6; --line:#d9d5cb; --ink:#22262e; --muted:#6b7280;
    --ok:#3a6b52; --danger:#8a3b3b;
    font-family:'Georgia',serif;
  }
  *{box-sizing:border-box;}
  body,.root{margin:0;background:var(--paper);color:var(--ink);font-family:-apple-system,Segoe UI,Helvetica,Arial,sans-serif;font-size:16px;}
  .app{display:flex;min-height:100vh;background:var(--paper);}
  .rail{width:280px;background:var(--navy-deep);color:#ffffff;flex-shrink:0;padding:20px 16px;}
  .rail h1{font-family:Georgia,serif;font-size:21px;letter-spacing:.03em;margin:0 0 14px;color:#fff;font-weight:700;}
  .rail .sub{font-size:13px;color:#c7d1ea;margin-bottom:18px;letter-spacing:.05em;text-transform:uppercase;}
  .prog-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
  .prog-btn{text-align:left;background:#233459;border:1px solid #3a4a75;color:#ffffff;padding:10px 12px;border-radius:6px;cursor:pointer;font-size:15.5px;font-weight:600;font-family:inherit;}
  .prog-btn:hover{background:#2d4270;border-color:var(--gold);}
  .prog-btn.active{background:var(--gold);color:#241d04;font-weight:700;border-color:var(--gold);}
  .add-prog{display:flex;gap:6px;margin-top:8px;}
  .add-prog input{flex:1;min-width:0;background:#233459;border:1px solid #3a4a75;color:#fff;padding:8px 10px;border-radius:5px;font-size:14.5px;}
  .add-prog button{background:var(--gold);border:none;color:#241d04;padding:8px 14px;border-radius:5px;cursor:pointer;font-weight:700;font-size:14.5px;}
  .main{flex:1;padding:30px 38px;max-width:1900px;}
  .prog-title{font-family:Georgia,serif;font-size:29px;color:var(--navy);margin:0 0 3px;}
  .prog-meta{font-size:14px;color:var(--muted);margin-bottom:20px;}
  .tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:22px;border-bottom:2px solid var(--line);padding-bottom:14px;}
  .tab{background:#fff;border:1px solid var(--line);padding:8px 14px;border-radius:16px;cursor:pointer;font-size:14.5px;color:var(--navy);}
  .tab.active{background:var(--navy);color:#fff;border-color:var(--navy);}
  .card{background:#fff;border:1px solid var(--line);border-radius:8px;padding:26px 28px;margin-bottom:18px;}
  .card h2{font-family:Georgia,serif;color:var(--navy);font-size:22px;margin:0 0 5px;border-bottom:2px solid var(--gold);padding-bottom:9px;}
  .card .desc{font-size:14.5px;color:var(--muted);margin:7px 0 18px;line-height:1.55;}
  label{display:block;font-size:14px;font-weight:700;color:var(--navy);margin:16px 0 6px;text-transform:uppercase;letter-spacing:.03em;}
  textarea,input[type=text]{width:100%;border:1px solid var(--line);border-radius:5px;padding:10px 12px;font-size:15.5px;font-family:inherit;background:#fffdf8;}
  textarea{min-height:78px;resize:vertical;}
  table{width:100%;border-collapse:collapse;font-size:14.5px;margin-top:6px;}
  th{background:var(--navy);color:#fff;padding:8px 8px;text-align:left;font-size:12.5px;text-transform:uppercase;letter-spacing:.02em;}
  td{border:1px solid var(--line);padding:6px;vertical-align:top;}
  td input,td textarea,td select{border:none;width:100%;background:transparent;font-size:14.5px;padding:4px;}
  td input:focus,td textarea:focus,td select:focus{background:#fff8e0;outline:1px solid var(--gold);}
  .row-actions{margin-top:10px;display:flex;gap:8px;}
  .btn{background:var(--navy);color:#fff;border:none;padding:9px 16px;border-radius:5px;cursor:pointer;font-size:14.5px;font-weight:600;}
  .btn.gold{background:var(--gold);color:#2a2205;}
  .btn.ghost{background:transparent;color:var(--navy);border:1px solid var(--navy);}
  .btn.small{padding:5px 11px;font-size:13.5px;}
  .toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .status{font-size:13.5px;color:var(--ok);}
  .pill{display:inline-block;background:var(--gold-light);color:#5a4a0f;border-radius:10px;padding:3px 10px;font-size:13px;margin-left:6px;}
  .empty{color:var(--muted);font-style:italic;font-size:15px;padding:10px 0;}
  .flowhint{background:#f2f6f2;border-left:3px solid var(--ok);padding:9px 13px;font-size:13.5px;color:#2f4d3d;margin-bottom:14px;border-radius:0 5px 5px 0;}
  /* higher-specificity fix: rail inputs must stay dark-background/white-text
     even though the generic input[type=text] rule above sets a light background */
  .rail input[type=text]{background:#233459;color:#fff;}
  .rail input[type=text]::placeholder{color:#c7d1ea;}
  .family-group{margin-bottom:16px;}
  .family-name{font-size:17px;color:#ffffff;font-weight:800;letter-spacing:.01em;padding:4px 2px;margin-top:8px;font-family:Georgia,serif;}
  .track-row{display:flex;flex-wrap:wrap;gap:6px;}
  .track-row .prog-btn.track-btn{flex:0 0 auto;min-width:90px;text-align:center;}
  .add-track-btn{background:transparent;border:1px dashed #5a6c99;color:#c7d1ea;font-size:12.5px;padding:5px 9px;border-radius:5px;cursor:pointer;margin:4px 0 6px;font-weight:600;}
  .bulk-toggle{background:none;border:none;color:#c7d1ea;font-size:12.5px;text-decoration:underline;cursor:pointer;padding:6px 0 0;font-weight:600;}
  .bulk-wrap textarea{width:100%;background:#233459;color:#fff;border:1px solid #3a4a75;border-radius:5px;font-size:13.5px;padding:7px 9px;min-height:70px;}
  .stepper{display:flex;flex-wrap:wrap;align-items:flex-start;gap:0;margin-bottom:6px;}
  .step{display:flex;flex-direction:column;align-items:center;cursor:pointer;position:relative;padding:0 10px 10px;min-width:80px;}
  .step .circle{width:30px;height:30px;border-radius:50%;background:#fff;border:2px solid var(--line);color:var(--navy);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;margin-bottom:5px;}
  .step .lbl{font-size:12px;text-align:center;color:var(--muted);line-height:1.3;max-width:88px;}
  .step.active .circle{background:var(--navy);border-color:var(--navy);color:#fff;}
  .step.active .lbl{color:var(--navy);font-weight:700;}
  .step.done .circle{background:var(--gold);border-color:var(--gold);color:#2a2205;}
  .step:hover .circle{border-color:var(--gold);}
  .step:not(:last-child)::after{content:'';position:absolute;top:13px;left:calc(50% + 22px);width:calc(100% - 22px);height:2px;background:var(--line);}
  .nav-hint{font-size:13.5px;color:var(--muted);margin-bottom:10px;}
  .back-link{display:inline-block;font-size:14px;color:var(--navy);text-decoration:none;margin-bottom:14px;cursor:pointer;font-weight:600;}
  .back-link:hover{text-decoration:underline;}
  .landing-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .landing-card{background:#fff;border:1px solid var(--line);border-radius:8px;padding:18px 20px;cursor:pointer;transition:border-color .15s;}
  .landing-card:hover{border-color:var(--gold);}
  .landing-card .num{font-size:12.5px;color:var(--gold);font-weight:700;letter-spacing:.05em;}
  .landing-card h3{margin:5px 0 7px;font-size:17px;color:var(--navy);font-family:Georgia,serif;}
  .landing-card p{margin:0;font-size:14px;color:var(--muted);line-height:1.45;}
  .landing-card .badge{float:right;font-size:11.5px;padding:3px 9px;border-radius:9px;background:#eee;color:#777;}
  .landing-card .badge.done{background:#dff0e6;color:var(--ok);}
  .instr{margin:8px 0 16px;border:1px solid var(--gold-light);border-left:3px solid var(--gold);border-radius:0 6px 6px 0;background:#fdfaf0;padding:12px 16px;}
  .instr .instr-label{font-size:12px;font-weight:700;color:#8a6d1a;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;}
  .instr .instr-body{font-size:14.5px;color:#3a3f4a;line-height:1.6;white-space:pre-line;}
  details.instr summary.instr-label{cursor:pointer;margin-bottom:0;list-style:none;}
  details.instr summary.instr-label::-webkit-details-marker{display:none;}
  details.instr summary.instr-label::before{content:'▸ ';}
  details.instr[open] summary.instr-label::before{content:'▾ ';}
  details.instr[open] summary.instr-label{margin-bottom:8px;}
  details.instr .instr-body{margin-top:4px;}
  .fhint{font-size:13.5px;color:#8a6d1a;font-style:italic;margin:-2px 0 6px;line-height:1.45;}
  .shint{font-size:14px;color:#6b7280;background:#f7f5ee;border-left:3px solid var(--gold-light);padding:9px 12px;margin:7px 0 11px;border-radius:0 5px 5px 0;line-height:1.55;white-space:pre-line;}
  .quick-edit{display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:#f2f6fb;border:1px solid #cddaf0;border-radius:5px;padding:8px 10px;margin-bottom:12px;}
  .quick-edit .qe-lbl{font-size:11.5px;text-transform:uppercase;letter-spacing:.03em;color:#5a6c8f;font-weight:700;}
  .quick-edit input{width:auto;flex:1;min-width:80px;padding:6px 8px;font-size:14.5px;border:1px solid #cddaf0;background:#fff;}
  .quick-edit .qe-title{flex:2;min-width:150px;}
</style>
</head>

<script>
const _sb = window.supabase.createClient(
  'https://tkstnkdxefivxeubfyeu.supabase.co',
  'sb_publishable_Dm3G5t5tmiydMThQx60TDg_J1L_zzbG'
);
window.storage = {
  get: async function(key, shared){
    const { data, error } = await _sb.from('app_state').select('value').eq('key', key).maybeSingle();
    if(error) throw error;
    return data ? { value: data.value } : null;
  },
  set: async function(key, value, shared){
    const { error } = await _sb.from('app_state').upsert({ key, value, updated_at: new Date().toISOString() });
    if(error) throw error;
  },
  delete: async function(key, shared){
    const { error } = await _sb.from('app_state').delete().eq('key', key);
    if(error) throw error;
  },
  list: async function(prefix, shared){
    const { data, error } = await _sb.from('app_state').select('key').like('key', prefix + '%');
    if(error) throw error;
    return (data||[]).map(r=>r.key);
  }
};
</script>

  story: `The goal is to describe the finished experience for a student and family, in plain language, before getting into mechanics. Use past tense throughout, as if the change has already launched.

Write a short announcement for admission (250 to 400 words) as if this program has already launched. Write it for the audience who will actually hear it: a prospective student, a parent, or an industry partner.

Include: a headline (one sentence, the hook); the problem this solves for students or the field; what is different about the student experience; a quote from a student or graduate describing the outcome; a quote from a faculty lead or department chair on why this matters; and how a student gets started.`,
  research: `You must conduct thoughtful research to ensure your program delivers the best possible degree for students. This research foundation will inform every decision you make and ensure your program maintains relevance, competitiveness, and student success.

Our commitment to excellence requires understanding three critical areas: industry demands, current student needs, and competitive positioning. If you have any of this information from your intake process, feel free to copy and paste it in.

Level Up Score Interpretation: find language from the previous prospectus.

Higher Education Research Interpretation / Competitive Position: paste links to at least three other higher-education programs similar to SCAD's offering, then in 2–3 sentences explain how these peer programs shaped your thinking, or how your enhancement distinguishes SCAD from them.

Market Trend Data Interpretation / Industry Trend Interpretation: what key industry and market trends are you observing that impact your academic program? Describe significant developments, disruptions, or shifts in your field/industry that have implications for your curriculum. Interpretation should include impacts of AI on the field (utilize the SCADask AI State of Design and Industry Outlook documents).

The ROI Test — address: target jobs (what positions will graduates be qualified for); is there enough demand for these jobs to support the major long-term; and return on investment (do starting salaries justify the cost of the degree)?

Industry Connection: list at least three industry contacts who would provide input on your revision and serve as future mentors of your program.`,
  pillars: `Identify 3–5 core pillars of knowledge/skill that define your program. These pillars should represent the essential competencies that students must develop to be workforce-ready upon program completion.

Note: if your department already has established program outcomes, you may refine them to better align with the pillar structure, or start fresh with new pillars if the current outcomes don't capture the essence of your program.

For each pillar, define: what the pillar means for your program; how it directly prepares students for industry expectations; and what kind of work artifact demonstrates mastery of it.`,
  stickfigure: `This is not for the first iteration of your program, maybe not even the fifth. Create many, think about market fit, feasibility, and innovation, then dig deeper and make another.

Complete the course table for each required course in your planned curriculum. This table showcases the courses all students will be required to take. If it is a directed elective option, display the number of selections students will take, to distinguish that they will not be taking every course in the list.

Now that you have mapped your courses to your program pillars, you understand what skills and knowledge students need to succeed in each class. The next step is to create a logical sequence that ensures students can progress smoothly through their degree while building the necessary foundation for success in each course. If you are incorporating courses owned by other majors, consult their sequence for when the course(s) are typically offered — see catalog.scad.edu.

Assign prerequisites strategically: for each course, ask what specific skills from your pillar mapping a student needs to succeed in it, which previous courses develop those exact skills, and what the minimum prerequisite requirement is that ensures success without creating barriers.

Once sequencing is complete: test the sequence with sample student scenarios; identify any scheduling conflicts or impossible pathways; refine prerequisites based on your analysis. The goal is a pathway that supports student success while ensuring students graduate workforce-ready with all program pillars fully developed.`,
  pillarmap: `The Pillar Mapping deliverable helps you think through skill and knowledge development for your entire program of study. By mapping where students are introduced to new knowledge and skills, where you reinforce that knowledge and skill, and where they showcase synthesis, you scaffold your curriculum, progress rigor throughout, and reveal a proper sequence for traversing the program.

For undergraduate curricula, add your foundation studies and general education courses along with your major curriculum.

For each course, indicate the level of pillar development: I = Introduced (students first encounter this pillar concept); R = Reinforced (students practice and build upon previous pillar knowledge); S = Synthesized (students integrate this pillar with others at an advanced level).

Quality Assurance Check: each pillar is introduced in at least one foundational course; each pillar is reinforced across multiple courses; each pillar reaches mastery level before program completion; all pillars are synthesized together in capstone experience(s); no courses are unmapped; progression is logical (Introduction → Reinforcement → Mastery → Synthesis).

Balance Check: pillars are evenly distributed across the program; no single pillar dominates excessively; synthesis opportunities exist throughout the program, not just at the end.

Industry Alignment Verification: all pillars directly connect to industry expectations; pillar definitions reflect current workforce needs; mastery levels align with entry-level professional competencies.`,
  coursecontent: `Use this template to document all course content for programs currently in development or revision. For each course, complete the Proposed/New columns in full; if the course is a revision of an existing course, also complete the Original columns with the current course information so changes can be clearly tracked.

Each entry should include the course description, proposed learning outcomes, sample session topics, and sample grading opportunities — all information necessary for Curriculum Council review and Banner entry.

Also indicate which pillar each course's outcomes map to (pillars must be defined in Deliverable III first).

If anything changes in one of these entries after the fact, it should inform the rest of the site and prompt a reconciliation — treat this as a decision log: every change gets saved along the way, and a check can be run to see what hasn't yet been reconciled, giving a running log of decisions made.`,
  assessment: `You've created the pillars and defined them. You've created your course outcomes that align to your pillars. You've mapped your pillars across the program. Now you need to draft the criteria to measure them and select the courses/artifacts used for measurement.`,
  transition: `This document will be shared with advising staff alongside the Curriculum Transition Plan. It provides the context and escalation guidance advisers need before supporting students through the change.

Section 1 — What This Is and Why It's Happening: in 2–3 sentences, explain the change or launch in plain language. What is driving this? What will be different for students?

Section 2 — The Three Things Every Adviser Must Know: the most critical facts about this change. Every adviser should be able to confirm these before speaking with a student. If a student question cannot be answered using these three points or the Transition Plan, use the escalation path.

Section 3 — Student Impact by Cohort: what this change means for students currently in the program, students entering under the new curriculum, students mid-sequence in affected courses, and transfer students.

Section 4 — Edge Cases to Watch For: student situations that are not straightforward and should not be advised without checking with Curriculum & Assessment or the department first (e.g. a retired course whose downstream prerequisite hasn't been fulfilled; a returning student under a prior catalog year; double-majors with overlapping old/new coursework).

Section 5 — Questions + Escalation Contacts: primary Curriculum & Assessment contact, Degree Planner contact, and Banner/enrollment contact.`,
  resources: `Use the following tables to analyze your additional faculty, training, hardware, software, space, and major equipment needs. All programs complete the top section on existing faculty. The remaining sections only need to be completed if resources are being requested.

1. Existing Faculty Analysis: list current faculty with the courses they will teach in the new curriculum (go by the new stick figure), their area/specialization, how many classes they're contracted to teach each year, and what capacity they have for additional classes. The aim is to ensure you have the faculty needed to transition seamlessly. Don't forget the number of sections you may need to satisfy demand.

2. Additional Faculty Needs: for each new position — full-time or part-time, course(s) they'd teach, required expertise/specialization, industry experience and educational requirements, and justification (why can't current faculty cover this, how many students would it serve, student-to-faculty ratio impact).

3. Faculty Training Needs: for each training type — expertise/skills needed, number of faculty needing it, and justification (what new content/skills, why essential, how it aligns with revised pillars). Training types include industry certification, software/technology training, conferences/workshops, graduate coursework, industry internships/fellowships, and vendor training.

4. Additional Hardware Needs: type, quantity, program integration (which courses, which outcomes, how many students per quarter), industry alignment (what standard it represents, what certifications it enables), space/special requirements, and timeline.

5. Additional Software Needs: title, license type, quantity/users, program integration, industry alignment, technical requirements, and timeline.

6. Additional Space Needs: space type, student capacity, program integration, industry alignment, special requirements (lighting, power, ventilation, tech, safety, accessibility), and timeline.

7. Additional Major Equipment Needs: type, quantity, program integration, industry alignment, space requirements, and timeline.`,
  syllabus: `Building lecture topics and grading opportunities for each course in the sequence.`

function instructionsBlock(key){
  const text = FULL_INSTRUCTIONS[key];
  if(!text) return '';
  return `<div class="instr"><div class="instr-label">Full instructions</div><div class="instr-body">${esc(text)}</div></div>`;
}

let state = {
  programs: [],           // [{id, programName, familyId, familyName, trackLabel, degreeType, degreeLevel, updatedAt}]
  activeProgram: null,
  activeTab: null,        // null = show program landing page
  data: {},               // programId -> deliverableKey -> payload
  status: '',
  showBulkAdd: false
};

function uid(){ return 'p_' + Date.now() + '_' + Math.random().toString(36).slice(2,8); }

const PROGRAM_INDEX_KEY = 'program-index';

async function loadPrograms(){
  try{
    const res = await window.storage.get(PROGRAM_INDEX_KEY, true);
    state.programs = res ? JSON.parse(res.value) : [];
  }catch(e){ state.programs = []; }
  // One-time cleanup: earlier versions left trackLabel blank for families
  // with only one degree level. Infer it from the program name so the rail
  // displays consistently for programs created before this fix.
  let migrated = false;
  state.programs.forEach(p=>{
    if(!p.trackLabel && p.familyName && p.programName && p.programName.startsWith(p.familyName + ' ')){
      p.trackLabel = p.programName.slice(p.familyName.length + 1).trim();
      migrated = true;
    }
  });
  if(migrated) await savePrograms();
  if(state.programs.length && !state.activeProgram) state.activeProgram = state.programs[0].id;
}

async function savePrograms(){
  await window.storage.set(PROGRAM_INDEX_KEY, JSON.stringify(state.programs), true);
}

// Fetch the canonical course list from the Sequenced Stick Figure tool's
// own storage record, so every downstream deliverable stays in sync with it.
async function getCourses(progId){
  try{
    const res = await window.storage.get('program:'+progId, true);
    if(!res) return [];
    const data = JSON.parse(res.value);
    return (data.courses||[]).map(c=>({
      id: c.id, subject: c.subject||'', number: c.number||'', title: c.title||'',
      prereqs: Array.isArray(c.prereqs)? c.prereqs.join(', ') : (c.prereqs||''),
      status: c.status||'', group: c.group||'', ownership: c.ownership||''
    }));
  }catch(e){ return []; }
}
// Keyed by the course's stable internal id (assigned once by the sequencing
// tool and never changed), NOT by subject/number/title — so editing a
// course's name or number later doesn't disconnect its Pillar Mapping,
// Course Content, or Syllabus Planning data. Falls back to the old
// composite key only for courses saved before this id existed.
function courseKeyOf(c){ return (c.id!==undefined && c.id!==null) ? 'c'+c.id : `${c.subject}_${c.number}_${c.title}`; }
function courseLabelOf(c){ return `${c.subject} ${c.number}${c.title? ' — '+c.title:''}`.trim(); }

// Lets any deliverable (not just the Stick Figure) edit a course's subject/
// number/title and have it stick everywhere, since it writes straight back
// to the same canonical record the sequencing tool reads and saves.
async function updateCourseCore(progId, courseId, patch){
  try{
    const res = await window.storage.get('program:'+progId, true);
    if(!res) return false;
    const data = JSON.parse(res.value);
    const c = (data.courses||[]).find(c=>c.id===courseId);
    if(!c) return false;
    Object.assign(c, patch);

async function loadDeliverable(progId, key){
  try{
    const res = await window.storage.get(`prog:${progId}:${key}`, true);
    return res ? JSON.parse(res.value) : null;
  }catch(e){ return null; }
}

async function saveDeliverable(progId, key, payload){
  await window.storage.set(`prog:${progId}:${key}`, JSON.stringify(payload), true);
  state.status = 'Saved ' + new Date().toLocaleTimeString();
  render();
}

function ensureCache(progId){
  if(!state.data[progId]) state.data[progId] = {};
}

async function getData(progId, key, fallback){
  ensureCache(progId);
  if(state.data[progId][key] !== undefined) return state.data[progId][key];
  const loaded = await loadDeliverable(progId, key);
  state.data[progId][key] = loaded || fallback;
  return state.data[progId][key];
}

async function addProgram(name){
  if(!name.trim()) return;
  const id = uid();
  const p = {id, programName: name.trim(), familyId: id, familyName: name.trim(), trackLabel:'', degreeType:'', degreeLevel:'', updatedAt: Date.now()};
  state.programs.push(p);
  state.activeProgram = id;
  state.activeTab = null;
  await saveNewProgramList();
}

async function bulkAddPrograms(text){
  const names = text.split('\n').map(s=>s.trim()).filter(Boolean);
  if(!names.length) return;
  names.forEach(name=>{
    const id = uid();
    state.programs.push({id, programName:name, familyId:id, familyName:name, trackLabel:'', degreeType:'', degreeLevel:'', updatedAt: Date.now()});
  });
  state.activeProgram = state.programs[state.programs.length-names.length].id;
  state.activeTab = null;
  state.showBulkAdd = false;
  await saveNewProgramList();
}

// Add a second (or further) degree-level track to an existing program family
// (e.g. adding an MFA track to an Animation family that already has an MA).
// Optionally clones pillars + courses from a sibling track as a starting
// point, since departments shouldn't have to re-enter shared material —
// after the copy, the two tracks are independent and can diverge freely.
async function addTrack(familyId, trackLabel, copyFromId){
  const sibling = state.programs.find(p=>p.id===copyFromId);
  const familyName = sibling ? sibling.familyName : (state.programs.find(p=>p.familyId===familyId)||{}).familyName || 'Program';
  const id = uid();
  const p = {id, programName: `${familyName} ${trackLabel}`.trim(), familyId, familyName, trackLabel, degreeType:'', degreeLevel:'', updatedAt: Date.now()};
  state.programs.push(p);

  if(sibling){
    try{
      const pillars = await loadDeliverable(sibling.id, 'pillars');
      if(pillars) await saveDeliverable(id, 'pillars', JSON.parse(JSON.stringify(pillars)));
    }catch(e){}
    try{
      const res = await window.storage.get('program:'+sibling.id, true);
      if(res){
        const src = JSON.parse(res.value);
        const clone = Object.assign({}, src, {
          id, programName: p.programName,
          courses: JSON.parse(JSON.stringify(src.courses||[]))
        });
        await window.storage.set('program:'+id, JSON.stringify(clone), true);
      }
    }catch(e){}
  }

  state.activeProgram = id;
  state.activeTab = null;
  await saveNewProgramList();
}

async function saveNewProgramList(){
  await savePrograms();
  render();
}

// Other degree-level tracks under the same major (e.g. the MA when you're
// looking at the MFA), for offering a retroactive copy — this is separate
// from the one-time copy offered when a track is first created, since
// programs that already existed before that flow ran (like the seeded
// starter list) never had a chance to copy from each other.
function getSiblingTracks(prog){
  return state.programs.filter(p=>p.familyId===prog.familyId && p.id!==prog.id);
}

async function copyPillarsFromSibling(prog, siblingId){
  const pillars = await loadDeliverable(siblingId, 'pillars');
  if(!pillars) { alert('That track has no pillars saved yet.'); return; }
  await saveDeliverable(prog.id, 'pillars', JSON.parse(JSON.stringify(pillars)));
  renderTab(prog);
}

async function copyCoursesFromSibling(prog, siblingId){
  try{
    const res = await window.storage.get('program:'+siblingId, true);
    if(!res){ alert('That track has no courses saved yet.'); return; }
    const src = JSON.parse(res.value);
    const destRes = await window.storage.get('program:'+prog.id, true);
    const dest = destRes ? JSON.parse(destRes.value) : {};
    const clone = Object.assign({}, dest, {
      id: prog.id, programName: prog.programName,
      courses: JSON.parse(JSON.stringify(src.courses||[])),
      electiveShells: JSON.parse(JSON.stringify(src.electiveShells||[])),
      nextId: src.nextId || ((src.courses||[]).length+1)
    });
    await window.storage.set('program:'+prog.id, JSON.stringify(clone), true);
    renderTab(prog);
  }catch(e){ alert('Could not copy courses from that track.'); }
}

// ---------- Word export (HTML->.doc trick, opens natively in Word) ----------
function downloadWordDoc(title, bodyHtml){
  const html = `<!DOCTYPE html><html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
  <head><meta charset='utf-8'><title>${title}</title>
  <style>
    body{font-family:Calibri,Arial,sans-serif;font-size:11pt;color:#000;}
    h1{font-size:18pt;color:#1c2b4a;border-bottom:2px solid #c9a227;padding-bottom:4px;}
    h2{font-size:13pt;color:#1c2b4a;margin-top:18px;}
    table{border-collapse:collapse;width:100%;margin-top:8px;}
    td,th{border:1px solid #999;padding:5px;font-size:10pt;vertical-align:top;}
    th{background:#1c2b4a;color:#fff;}
    .meta{color:#666;font-size:9pt;margin-bottom:14px;}
  </style></head>
  <body>${bodyHtml}</body></html>`;
  const blob = new Blob(['\ufeff', html], {type: 'application/msword'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = title.replace(/[^a-z0-9\-_ ]/gi,'').replace(/\s+/g,'_') + '.doc';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function esc(s){ return (s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br/>'); }

// helper to build editable table
function buildTable(container, rows, columns, onChange, opts={}){
  const tbl = document.createElement('table');
  tbl.innerHTML = `<thead><tr>${columns.map(c=>`<th>${c.label}</th>`).join('')}${opts.removable!==false?'<th></th>':''}</tr></thead>`;
  const tbody = document.createElement('tbody');
  rows.forEach((row,ri)=>{
    const tr = document.createElement('tr');
    columns.forEach(c=>{
      const td = document.createElement('td');
      if(c.type==='select'){
        const sel = document.createElement('select');
        (c.options(row)||[]).forEach(optVal=>{
          const o = document.createElement('option');
          o.value = optVal; o.textContent = optVal || '—';
          if(row[c.key]===optVal) o.selected = true;
          sel.appendChild(o);
        });
        sel.addEventListener('change', ()=>{ row[c.key]=sel.value; onChange(); });
        td.appendChild(sel);
      } else if(c.type==='textarea'){
        const ta = document.createElement('textarea');
        ta.rows=2; ta.value = row[c.key]||'';
        ta.addEventListener('input', ()=>{ row[c.key]=ta.value; onChange(); });
        td.appendChild(ta);
      } else {
        const inp = document.createElement('input');
        inp.type='text'; inp.value = row[c.key]||'';
        inp.readOnly = !!c.readonly;
        inp.addEventListener('input', ()=>{ row[c.key]=inp.value; onChange(); });
        td.appendChild(inp);
      }
      tr.appendChild(td);
    });
    if(opts.removable!==false){
      const td = document.createElement('td');
      const btn = document.createElement('button');
      btn.className='btn small ghost'; btn.textContent='Remove';
      btn.addEventListener('click', ()=>{ rows.splice(ri,1); onChange(); container._rerender(); });
      td.appendChild(btn); tr.appendChild(td);
    }
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);
  container.appendChild(tbl);
}

// IV. Sequenced Stick Figure — embeds the dedicated sequencing tool (bundled
// into this same file, see SEQ_TOOL_B64), scoped to the current program.
// That tool owns the canonical course list; every downstream deliverable
// below reads directly from its saved data.
function buildSeqToolSrcdoc(prog){
  // Plain atob() only correctly reconstructs ASCII bytes — any multi-byte
  // UTF-8 character in the source (em dashes, curly quotes, etc.) comes back
  // as garbled characters unless it's run through a proper UTF-8 decode.
  const html = decodeURIComponent(atob(SEQ_TOOL_B64).split('').map(function(c){
    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
  }).join(''));
  // window.storage (the persistence API) is only injected by the host into
  // this top-level artifact page — a nested srcdoc iframe does NOT get its
  // own copy. So every call the embedded tool makes to window.storage.get/
  // set/delete/list is bridged here via postMessage to the parent, which
  // does have a working window.storage, and the result is sent back.
  const inject = `<script>
    window.__EMBED_PID__=${JSON.stringify(prog.id)};
    window.__EMBED_PNAME__=${JSON.stringify(prog.programName)};
    window.__EMBED_TRACK__=${JSON.stringify(prog.trackLabel || '')};
    (function(){
      let reqCounter = 0;
      const pending = {};
      window.addEventListener('message', function(e){
        const d = e.data;
        if(d && d.__storageBridgeResponse && pending[d.reqId]){
          const p = pending[d.reqId]; delete pending[d.reqId];
          if(d.error) p.reject(new Error(d.error)); else p.resolve(d.result);
        }
      });
      function call(method, args){
        return new Promise(function(resolve, reject){
          const reqId = 'r' + (reqCounter++) + '_' + Date.now();
          pending[reqId] = {resolve: resolve, reject: reject};
          window.parent.postMessage({__storageBridge:true, reqId: reqId, method: method, args: args}, '*');
        });
      }
      window.storage = {
        get: function(key, shared){ return call('get',[key, shared]); },
        set: function(key, value, shared){ return call('set',[key, value, shared]); },
        delete: function(key, shared){ return call('delete',[key, shared]); },
        list: function(prefix, shared){ return call('list',[prefix, shared]); }
      };
    })();
  <\/script>`;
  // inject right after <head> so it runs before the tool's own script block
  return html.replace('<head>', '<head>' + inject);
}

// Parent-side half of the bridge above: performs the real storage call
// (this top-level page's window.storage works normally) and posts the
// result back to whichever iframe asked for it.
window.addEventListener('message', async (e)=>{
  const d = e.data;
  if(!d || !d.__storageBridge) return;
  try{
    const result = await window.storage[d.method](...d.args);
    e.source.postMessage({__storageBridgeResponse:true, reqId:d.reqId, result}, '*');
  }catch(err){
    e.source.postMessage({__storageBridgeResponse:true, reqId:d.reqId, error: (err && err.message) || String(err)}, '*');
  }
});

  const pillarsData = await getData(prog.id,'pillars',{pillars:[]});
  const data = await getData(prog.id,'pillarmap',{levels:{}}); // levels[courseKey][pillarName] = I/R/S

  const pillars = pillarsData.pillars.filter(p=>p.name);

  if(!courses.length || !pillars.length){
    let missing;
    if(!courses.length && !pillars.length) missing = 'Add courses in "IV. Sequenced Stick Figure" (and save the program there) and name at least one pillar in "III. Pillars."';
    else if(!courses.length) missing = 'Pillars are named — now add courses in "IV. Sequenced Stick Figure" and save the program there.';

    body.innerHTML = `<div class="card"><h2>Pillar Mapping</h2>
      <div class="desc">This deliverable auto-builds from your courses (IV) and pillars (III).</div>
      <div class="empty">${missing}</div></div>`;

  }

  const rows = courses.map(c=>({key: courseKeyOf(c), label: courseLabelOf(c), course:c}));

  body.innerHTML = `<div class="card">
    <h2>Pillar Mapping</h2>
    <div class="desc">The Pillar Mapping deliverable helps you think through skill and knowledge development for your entire program of study. By mapping where students are introduced to new knowledge and skills, where you reinforce that knowledge and skill, and where they showcase synthesis, you scaffold your curriculum, progress rigor throughout, and reveal a proper sequence for traversing the program. For undergraduate curricula, add your foundation studies and general education courses along with your major curriculum — use catalog.scad.edu to access the descriptions for general education and foundation studies courses.</div>
    <div class="shint">For each course in your program of study, indicate the level of pillar development using the following scale: <b>I</b> = Introduced (students first encounter this pillar concept), <b>R</b> = Reinforced (students practice and build upon previous pillar knowledge), <b>S</b> = Synthesized (students integrate this pillar with others at an advanced level).</div>

    <div class="shint"><b>Balance Check:</b> pillars are evenly distributed across the program; no single pillar dominates excessively; synthesis opportunities exist throughout the program, not just at the end.</div>
    <div class="shint"><b>Industry Alignment Verification:</b> all pillars directly connect to industry expectations; pillar definitions reflect current workforce needs; mastery levels align with entry-level professional competencies.</div>
    ${toolbar()}
  </div>`;

    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${esc(r.label)} <button class="btn small ghost" data-edit-course="1" style="padding:1px 6px;font-size:10.5px;">✎</button></td>` + pillars.map(p=>`<td></td>`).join('');

      const c = r.course;
      const newSubject = prompt('Subject code:', c.subject) ?? c.subject;
      const newNumber = prompt('Course number:', c.number) ?? c.number;
      const newTitle = prompt('Course title:', c.title) ?? c.title;
      await updateCourseCore(prog.id, c.id, {subject:newSubject, number:newNumber, title:newTitle});
      renderTab(prog);
    });
    const tds = tr.querySelectorAll('td');
    pillars.forEach((p, i)=>{
      const sel = document.createElement('select');
      ['','I','R','S'].forEach(v=>{
        const o=document.createElement('option'); o.value=v; o.textContent=v||'—';
        if((data.levels[r.key][p.name]||'')===v) o.selected=true;
        sel.appendChild(o);
      });
      sel.addEventListener('change', ()=>{
        data.levels[r.key][p.name] = sel.value;
        saveDeliverable(prog.id,'pillarmap',data);
      });
      tds[i+1].appendChild(sel);

      </table>`;
    downloadWordDoc(`${prog.programName}_Deliverable_V_Pillar_Mapping`, html);
  });
};

      <h2 style="font-size:12pt;">Catalog Year</h2>
      <p><b>Do I need to update my catalog year?</b></p>

      <p>&nbsp;&nbsp;○ Freshmen (rising sophomores): We encourage you to update your catalog.</p>
      <p>&nbsp;&nbsp;○ Sophomores (rising juniors): You may consider updating to the new catalog year depending on your specific situation and the number of credits you have already completed.</p>
      <p>&nbsp;&nbsp;○ Juniors (rising seniors): We encourage you to remain on your current catalog year. However, you are allowed to update if desired, with the precaution that it may require additional coursework.</p>
      <p><b>If I stay on my current catalog year, will I have to take additional classes to graduate?</b></p>
      <p>• No. If you choose not to update your catalog year, you may complete your degree requirements without taking any additional courses. You will need to use the equivalency chart below to take the appropriate classes to fulfill your degree requirements.</p>
      <p><b>If I update my catalog year, will I have to take additional classes to graduate?</b></p>

      <p><b>Can I receive credit for taking one of the updated courses that is equivalent to one I've previously taken?</b></p>

      <p><b>If I update my catalog year, may I substitute in any classes that are not directly equivalent into the new curriculum?</b></p>
      <p>• This will vary based on your individual situation. For the most part, substitutions should not be required for students who update to the new curriculum. If you have taken courses that are no longer a direct requirement in the new curriculum, those courses may fulfill electives, based on eligibility. Please see your success adviser to discuss your options.</p>

};

// X. Syllabus planning
RENDERERS.syllabus = async (prog, body) => {
  const allCourses = (await getCourses(prog.id)).filter(c=>c.title || c.subject);
  const courses = allCourses.filter(c=>c.status==='new');
  const data = await getData(prog.id,'syllabus',{entries:{}, selected:''});
  if(!allCourses.length){
    body.innerHTML = `<div class="card"><h2>Syllabus Planning</h2>
      <div class="empty">Add courses in "IV. Sequenced Stick Figure" first (and save the program there) — they'll appear here automatically.</div></div>`;
    return;
  }
  if(!courses.length){
    body.innerHTML = `<div class="card"><h2>Syllabus Planning</h2>
      <div class="desc">Syllabus Planning is only needed for courses the department has designated as <b>New Course</b> on the Sequenced Stick Figure (Deliverable IV) — not revisions, restorations, or existing courses.</div>
      <div class="empty">None of this program's courses are currently marked "New Course" in Deliverable IV. Mark a course's status as New there, save the program, and it will appear here.</div></div>`;
    return;
  }
  if(data.selected && !courses.find(c=>courseKeyOf(c)===data.selected)) data.selected='';

  body.innerHTML = `<div class="card">
    <h2>Syllabus Planning</h2>
    <div class="desc">Syllabus Planning is only needed for courses the department has designated as <b>New Course</b> on the Sequenced Stick Figure (Deliverable IV). For each new course, plan out 20 class sessions (lecture topics, planned demonstrations, class activities) and at least 5 grading opportunities, each with a weight toward the final grade.</div>
    <div class="flowhint">This list is the "New Course" subset of Deliverable IV's course list, automatically. Need to fix a course's name or number? Edit it right here — it updates the Stick Figure and every other tab too.</div>
    <label>New courses needing syllabus content</label>
    <div id="sylList" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;"></div>
    <div id="sylDetail"></div>
    ${data.selected ? toolbar() : ''}
  </div>`;

  const list = body.querySelector('#sylList');
  courses.forEach(c=>{
    const key = courseKeyOf(c);
    const btn = document.createElement('button');
    btn.className = 'btn small ' + (data.selected===key ? '' : 'ghost');
    btn.textContent = courseLabelOf(c) || '(untitled course)';
    btn.addEventListener('click', ()=>{ data.selected = key; saveDeliverable(prog.id,'syllabus',data).then(()=>renderTab(prog)); });
    list.appendChild(btn);
  });

  const detail = body.querySelector('#sylDetail');
  const selectedCourse = courses.find(c=>courseKeyOf(c)===data.selected);
  if(!selectedCourse){
    detail.innerHTML = `<div class="empty">Click a course above to plan its syllabus.</div>`;
    return;
  }
  const key = data.selected;
  if(!data.entries[key]) data.entries[key] = {};
  const e = data.entries[key];
  if(!e.sessions || e.sessions.length!==20) e.sessions = Array.from({length:20}, (_,i)=> (e.sessions && e.sessions[i]) || {content:''});
  if(!e.grading || !e.grading.length) e.grading = Array.from({length:5}, ()=>({title:'',weight:'',explanation:''}));

  detail.innerHTML = `${courseQuickEdit(prog, selectedCourse)}
    <label>Class Sessions (20)</label>
    <div class="fhint">Lecture topics, planned demonstrations, class activities, etc. for each session.</div>
    <div id="sessionsWrap"></div>
    <label>Grading Opportunities</label>
    <div class="fhint">At least 5, but add more if needed. Include the assignment title, its weight toward the final grade, and a brief explanation.</div>
    <div id="gradingWrap"></div>
    <div class="row-actions"><button class="btn small ghost" id="addGrading">+ Add grading opportunity</button></div>`;
  wireCourseQuickEdit(detail, prog, selectedCourse);

  const sessionsWrap = detail.querySelector('#sessionsWrap');
  e.sessions.forEach((s,i)=>{
    const row = document.createElement('div');
    row.style.cssText='display:flex;gap:8px;align-items:flex-start;margin-bottom:6px;';
    row.innerHTML = `<div style="flex:0 0 70px;padding-top:9px;font-size:13px;font-weight:700;color:var(--navy);">Session ${i+1}</div>
      <textarea style="flex:1;min-height:44px;" data-session="${i}">${esc(s.content)}</textarea>`;
    row.querySelector('textarea').addEventListener('input', (ev)=>{ e.sessions[i].content = ev.target.value; saveDeliverable(prog.id,'syllabus',data); });
    sessionsWrap.appendChild(row);
  });

  const gradingWrap = detail.querySelector('#gradingWrap');
  gradingWrap._rerender = ()=>renderTab(prog);
  buildTable(gradingWrap, e.grading, [
    {key:'title',label:'Assignment Title'},{key:'weight',label:'Weight (% of final grade)'},
    {key:'explanation',label:'Brief Explanation',type:'textarea'}
  ], ()=>saveDeliverable(prog.id,'syllabus',data));
  detail.querySelector('#addGrading').addEventListener('click', ()=>{
    e.grading.push({title:'',weight:'',explanation:''});
    saveDeliverable(prog.id,'syllabus',data).then(()=>renderTab(prog));
  });

  wireExport(body, ()=>{
    const html = `<h1>Deliverable X: Syllabus Planning — ${esc(prog.programName)}</h1>
      ${courses.map(c=>{
        const k = courseKeyOf(c); const ce = data.entries[k];
        if(!ce) return `<h2>${esc(courseLabelOf(c))}</h2><p><i>Not yet planned</i></p>`;
        return `<h2>${esc(courseLabelOf(c))}</h2>
          <h3 style="font-size:11pt;">Class Sessions</h3>
          <table><tr><th>#</th><th>Content</th></tr>${(ce.sessions||[]).map((s,i)=>`<tr><td>${i+1}</td><td>${esc(s.content)}</td></tr>`).join('')}</table>
          <h3 style="font-size:11pt;">Grading Opportunities</h3>
          <table><tr><th>Assignment</th><th>Weight</th><th>Explanation</th></tr>${(ce.grading||[]).map(g=>`<tr><td>${esc(g.title)}</td><td>${esc(g.weight)}</td><td>${esc(g.explanation)}</td></tr>`).join('')}</table>`;
      }).join('')}`;
    downloadWordDoc(`${prog.programName}_Deliverable_X_Syllabus_Planning`, html);
  });
};

// ---------- shared field helpers ----------
function field(labelText, key, val, big, hint){
  return `<label>${labelText}</label>${hint? `<div class="fhint">${esc(hint)}</div>`:''}${big? `<textarea data-field="${key}">${esc(val)}</textarea>` : `<input type="text" data-field="${key}" value="${(val||'').toString().replace(/"/g,'&quot;')}"/>`}`;
}
function sectionHint(text){
  return `<div class="shint">${esc(text)}</div>`;
}
function toolbar(){
  return `<div class="row-actions"><button class="btn gold" data-export>Download as Word</button></div>`;
}
function wireFields(body, data, onSave){
  body.querySelectorAll('[data-field]').forEach(el=>{
    el.addEventListener('input', ()=>{ data[el.dataset.field]=el.value; onSave(); });
  });
}
function wireExport(body, fn){
  body.querySelector('[data-export]')?.addEventListener('click', fn);
}

// ---------- init ----------
const STARTER_PROGRAMS = [
  {familyName:'Animation', tracks:['MA','MFA']},
  {familyName:'Visual Effects', tracks:['MA','MFA']},
  {familyName:'Fashion Marketing and Management', tracks:['MA','MFA']},
  {familyName:'Sound Design', tracks:['BFA']},
  {familyName:'Acting', tracks:['BFA']},
  {familyName:'Film and Television', tracks:['BFA']},
  {familyName:'Writing', tracks:['BFA','MFA']},
];
async function seedDefaultPrograms(){
  // Skip anything that already exists (matched by the exact program name),
  // so this can safely run on first load and also be re-triggered by hand
  // later without creating duplicates.
  const existingNames = new Set(state.programs.map(p=>p.programName));
  STARTER_PROGRAMS.forEach(fam=>{
    const familyId = uid();
    fam.tracks.forEach(trackLabel=>{
      const programName = `${fam.familyName} ${trackLabel}`.trim();
      if(existingNames.has(programName)) return;
      const id = uid();
      state.programs.push({
        id, familyId, familyName: fam.familyName,
        trackLabel,
        programName,
        degreeType:'', degreeLevel:'', updatedAt: Date.now()
      });
    });
  });
  await savePrograms();
}

(async function init(){
  await loadPrograms();
  if(!state.programs.length) await seedDefaultPrograms();
  render();
})();
</script>
